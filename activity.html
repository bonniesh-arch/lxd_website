<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity - Learning Experience</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="page">
        <a href="dashboard.html" class="btn-back">←</a>

        <main id="main-content" class="container" style="padding: 2.5rem 0; 
            <div style="padding: 3rem; text-align: center;">
                <p style="color: #666; font-size: 1.1rem;">Loading activity...</p>
            </div>
        </main>
    </div>

    <script src="ai-prompts.js"></script>
    <script src="activity.js"></script>
    <script>
        // Error handler in case activity.js doesn't load
        window.addEventListener('error', (e) => {
            console.error('👀 Global error caught:', e.error);
            const mainContent = document.getElementById('main-content');
            if (mainContent) {
                mainContent.innerHTML = '<div style="padding: 3rem; color: red; font-weight: bold;">❌ Error loading activity. Check browser console.</div>';
            }
        });
    </script>
</body>
</html>
